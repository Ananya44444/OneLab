<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OneLab MVP: AI-powered personalized learning and research assistant" />
  <meta name="keywords" content="AI tutor, RAG, learning graph, research assistant, Django" />
  <title>OneLab {% block title %}{% endblock title %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *, body { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(160deg, #134e4a 0%, #0a3d3a 60%, #0e4a43 100%); }
    .dot-typing span { display:inline-block; width:5px; height:5px; border-radius:50%; background:#5eead4;
      animation: pulse 1.2s infinite; }
    .dot-typing span:nth-child(2){animation-delay:.2s}
    .dot-typing span:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    .msg-in{animation:fadeUp .15s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#0f766e;border-radius:4px}
  </style>
</head>
<body class="text-teal-50 min-h-screen">

  <header class="border-b border-teal-700/50 sticky top-0 z-50 bg-teal-900/80 backdrop-blur">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="{% url 'chat_page' %}" class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-orange-400"></span>
        <span class="font-semibold text-white tracking-tight">OneLab</span>
      </a>
      <nav class="flex items-center gap-6 text-sm">
        <a href="{% url 'chat_page' %}"
           class="transition-colors {% block nav_tutor %}text-teal-400 hover:text-teal-100{% endblock nav_tutor %}">
          Tutor
        </a>
        <a href="{% url 'upload_view' %}"
           class="transition-colors {% block nav_research %}text-teal-400 hover:text-teal-100{% endblock nav_research %}">
          Research
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-6">
    {% block content %}{% endblock content %}
  </main>

</body>
</html>
